<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Registration - MFU Election</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(to bottom right, #f0fdf4, #ecfdf5); padding: 20px;">

    <div class="container" style="max-width: 450px; width: 100%;">
        
        <div style="margin-bottom: 25px; display: flex; justify-content: center;">
            <a href="index.html" style="text-decoration: none; color: #64748b; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 0.95rem;">
                ← Back to Home
            </a>
        </div>

        <div class="card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #dcfce7;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 1.8rem; color: #15803d; margin-bottom: 10px;">Candidate Register</h1>
                <p style="color: #64748b; font-size: 0.95rem;">Create your account to join the election</p>
            </div>
            
            <form>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Candidate ID</label>
                    <input type="text" placeholder="ID provided by Admin (e.g., C004)" style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 1rem;">
                    <small style="color: #94a3b8; display: block; margin-top: 5px;">Please use the ID received from the system administrator.</small>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Create Password</label>
                    <input type="password" placeholder="••••••••" style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 1rem;">
                </div>

                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Confirm Password</label>
                    <input type="password" placeholder="••••••••" style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 1rem;">
                </div>

                <a href="candidate-dashboard.html" class="btn" style="width: 100%; background-color: #16a34a; color: white; padding: 14px 0; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; text-align: center; display: block; text-decoration: none;" onmouseover="this.style.backgroundColor='#15803d'" onmouseout="this.style.backgroundColor='#16a34a'">
                    Register Account
                </a>

                <div style="text-align: center; margin-top: 25px;">
                    <p style="font-size: 0.9rem; color: #64748b;">
                        Already have an account? 
                        <a href="candidate-login.html" style="color: #15803d; font-weight: 700; text-decoration: none;">Log in here</a>
                    </p>
                </div>
            </form>
        </div>
        
        <!-- <footer style="text-align: center; margin-top: 40px; color: #94a3b8; font-size: 0.85rem;">
            © 2026 Mae Fah Luang University - All rights reserved
        </footer> -->
    </div>

</body>
</html>
