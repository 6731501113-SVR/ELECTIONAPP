<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Your Vote - MFU Election</title>
    <link rel="stylesheet" href="/CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            margin: 0;
        }

        .search-box {
            position: relative;
            max-width: 500px;
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-box span {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .candidate-label:hover {
            border-color: #93c5fd !important;
            background-color: #f8fafc;
        }
    </style>
</head>

<body style="display: block;">


    <nav class="navbar voter"
        style="background-color: #2563eb; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;">
        <h2 style="margin: 0;">MFU Voting - Voter</h2>
        <a href="/" onclick="logout()" class="btn"
            style="background: white; color: #2563eb; padding: 8px 20px; text-decoration: none; border-radius: 8px; font-weight: bold;">Logout</a>
    </nav>


    <div class="nav-links"
        style="background: white; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 15px 15px 13px; position: fixed; top: 65px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 999; flex-wrap: wrap; box-sizing: border-box;">
        <a href="/pages/voter/dashboard"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📊
            Dashboard</a>
        <a href="/pages/voter/candidates"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">👥
            Candidates</a>
        <a href="/pages/voter/voting"
            style="text-decoration: none; color: #2563eb; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid #2563eb; font-weight: 600;">🗳️
            Vote Now</a>
        <a href="/pages/voter/history"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">🕒
            History</a>
        <a href="/pages/voter/results"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📈
            Results</a>
    </div>


    <div class="container"
        style="margin-top: 170px; max-width: 1000px; margin-left: auto; margin-right: auto; padding: 20px;">
        <h1 style="margin: 0 0 10px 0; color: #1e293b;">Cast Your Vote</h1>
        <p style="color: #ef4444; margin-bottom: 30px; font-weight: 600;">⚠️ Warning: You can only vote once. This
            action cannot be undone.</p>


        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="search" placeholder="Search by Name, ID...">
        </div>


        <div class="card"
            style="background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0; margin-bottom: 25px; color: #1e293b;">Select your preferred candidate</h3>

            <div id="candidateList" style="display: grid; gap: 15px;">
                <p style="text-align: center; color: #64748b;">Loading candidates...</p>
            </div>


            <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
                <button id="confirmBtn" class="btn"
                    style="background: #2563eb; color: white; padding: 12px 35px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer;">Confirm
                    Vote</button>
            </div>
        </div>
        <footer style="text-align: center; margin-top: 50px; padding: 20px; color: #94a3b8; font-size: 0.9rem;">
            © 2026 Mae Fah Luang University - All rights reserved
        </footer>
    </div>


    <script>
        const confirmBtn = document.getElementById("confirmBtn");
        confirmBtn.disabled = true;
        confirmBtn.style.backgroundColor = "#94a3b8";
        confirmBtn.style.cursor = "not-allowed";
        // check has_voted และ is_open
        Promise.all([
            fetch('/voter/has_voted').then(res => res.json()),
            fetch('/admin/control').then(res => res.json())
        ]).then(([hasVotedData, controlData]) => {
            const list = document.getElementById("candidateList");
            
            // ==========================================
            // -1. ตรวจสอบระบบเปิด/ปิด
            // ==========================================
            if (!controlData.is_open || controlData.is_open === 0) {
                list.innerHTML = "";
                const message = document.createElement("p");
                message.textContent = "🔒 Voting system is currently closed. Please try again later.";
                message.style.textAlign = "center";
                message.style.color = "#ef4444";
                message.style.fontSize = "1.1rem";
                list.appendChild(message);
                confirmBtn.disabled = true;
                confirmBtn.style.backgroundColor = "#94a3b8";
                confirmBtn.style.cursor = "not-allowed";
                return;
            }
            
            if (hasVotedData.has_voted) {
                // ==========================================
                // 0. ถ้าโหวตแล้ว แสดงข้อความและปิดการโหวต
                // ==========================================
                list.innerHTML = "";
                const message = document.createElement("p");
                message.textContent = "I WILL NEVER GONNA GIVE YOU A CHANCE TO VOTE AGAIN! (You have already voted)";
                message.style.textAlign = "center";
                message.style.color = "#ef4444";
                message.style.fontSize = "1.1rem";
                const image = document.createElement("img");
                image.src = "/img/never-gonna-give-you-up.gif";
                image.style.display = "block";
                image.style.margin = "20px auto";
                list.appendChild(message);
                list.appendChild(image);
            } else {
                // ==========================================
                // 1. ดึงข้อมูลผู้สมัครมาแสดงเป็นตัวเลือก 
                // ==========================================
                fetch('/voter/candidates').then(res => res.json()).then(data => {
                    console.log("Fetched Candidates:", data);
                    const list = document.getElementById("candidateList");
                    list.innerHTML = "";

                    const fragment = document.createDocumentFragment();

                    const themeColors = [
                        { bg: '#eff6ff', text: '#2563eb' },
                        { bg: '#f0fdf4', text: '#16a34a' },
                        { bg: '#faf5ff', text: '#9333ea' },
                        { bg: '#fff7ed', text: '#ea580c' }
                    ];

                    data.forEach((candidate, index) => {

                        const theme = themeColors[index % themeColors.length];

                        const label = document.createElement("label");
                        label.className = "candidate-label";

                        label.style.display = "flex";
                        label.style.alignItems = "center";
                        label.style.gap = "20px";
                        label.style.padding = "20px";
                        label.style.border = "1.5px solid #e2e8f0";
                        label.style.borderRadius = "12px";
                        label.style.cursor = "pointer";

                        const radio = document.createElement("input");
                        radio.type = "radio";
                        radio.name = "candidate";
                        radio.value = candidate.Candidate_ID;
                        radio.addEventListener("change", () => {
                            confirmBtn.disabled = false;
                            confirmBtn.style.backgroundColor = "#2563eb";
                            confirmBtn.style.cursor = "pointer";
                        });

                        let icon;
                        if (candidate.img) {
                            icon = document.createElement("img");
                            icon.src = candidate.img;
                            icon.alt = candidate.Name;
                            icon.style.width = "50px";
                            icon.style.height = "50px";
                            icon.style.borderRadius = "50%";
                            icon.style.objectFit = "cover";
                            icon.style.border = `2px solid ${theme.bg}`;
                        } else {
                            icon = document.createElement("div");
                            icon.textContent = "👤";
                            icon.style.width = "50px";
                            icon.style.height = "50px";
                            icon.style.background = theme.bg;
                            icon.style.borderRadius = "50%";
                            icon.style.display = "flex";
                            icon.style.alignItems = "center";
                            icon.style.justifyContent = "center";
                            icon.style.color = theme.text;
                            icon.style.fontSize = "1.5rem";
                        }

                        const info = document.createElement("div");
                        info.style.flexGrow = "1";

                        const name = document.createElement("h3");
                        name.textContent = candidate.Name;

                        name.style.margin = "0";
                        name.style.fontSize = "1.1rem";
                        name.style.color = "#1e293b";

                        const idSpan = document.createElement("span");
                        idSpan.textContent = ` (${candidate.Candidate_ID})`;
                        idSpan.style.color = "#94a3b8";
                        idSpan.style.fontWeight = "normal";
                        idSpan.style.fontSize = "0.9rem";

                        name.appendChild(idSpan);

                        const policy = document.createElement("p");
                        policy.textContent = candidate.Policy;

                        policy.style.margin = "5px 0 0";
                        policy.style.color = "#64748b";
                        policy.style.fontSize = "0.9rem";

                        info.appendChild(name);
                        info.appendChild(policy);

                        label.appendChild(radio);
                        label.appendChild(icon);
                        label.appendChild(info);

                        fragment.appendChild(label);

                    });

                    list.appendChild(fragment);

                }).catch(err => {
                    console.error(err);
                });
            }
        }).catch(err => {
            console.error("Error checking vote or system status:", err);
        });

        // ==========================================
        // 2. จัดการตอนกดปุ่ม "Confirm Vote"
        // ==========================================
        confirmBtn.addEventListener('click', () => {
            const selectedCandidate = document.querySelector('input[name="candidate"]:checked');
            const selectedCanId = selectedCandidate.value;

            // ถามยืนยันอีกครั้ง
            const confirmVote = confirm(`Are you sure you want to vote for candidate ${selectedCanId}? This action cannot be undone.`);

            if (confirmVote) {
                // ข้อมูลที่จะส่งไป Backend
                const voteData = {
                    can_id: selectedCanId
                };

                // ส่ง POST Request ไปหา API /vote
                fetch('/Voter/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(voteData)
                }).then(response => {
                    if (response.ok) {
                        alert('✅ Your vote has been successfully submitted!');

                        window.location.href = '/pages/voter/results';
                    } else {
                        alert('❌ Failed to submit vote.');
                    }
                })
                    .catch(error => {
                        console.error('Error submitting vote:', error);
                        alert('❌ System error. Could not connect to server.');
                    });
            }
        });

        document.querySelector('#search').addEventListener('input', function () {
            const query = this.value.toLowerCase();
            document.querySelectorAll('#candidateList label').forEach(label => {
                const name = label.querySelector('h3').textContent.toLowerCase();
                const id = label.querySelector('h3 span').textContent.toLowerCase();
                if (name.includes(query) || id.includes(query)) {
                    label.style.display = 'flex';
                } else {
                    label.style.display = 'none';
                }
            });
        });

        function logout() {
            fetch('/logout', { method: 'POST' })
                .then(() => window.location.href = '/')
                .catch(err => console.error("Logout error:", err));
        }
    </script>
</body>

</html>
