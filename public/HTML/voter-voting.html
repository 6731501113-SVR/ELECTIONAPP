<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Your Vote - MFU Election</title>
    <link rel="stylesheet" href="/CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            margin: 0;
        }

        .search-box {
            position: relative;
            max-width: 500px;
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-box span {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .candidate-label:hover {
            border-color: #93c5fd !important;
            background-color: #f8fafc;
        }
    </style>
</head>

<body style="display: block;">


    <nav class="navbar voter"
        style="background-color: #2563eb; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;">
        <h2 style="margin: 0;">MFU Voting - Voter</h2>
        <a href="/" class="btn"
            style="background: white; color: #2563eb; padding: 8px 20px; text-decoration: none; border-radius: 8px; font-weight: bold;">Logout</a>
    </nav>


    <div class="nav-links"
        style="background: white; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 15px 15px 13px; position: fixed; top: 65px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 999; flex-wrap: wrap; box-sizing: border-box;">
        <a href="/pages/voter/dashboard"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📊
            Dashboard</a>
        <a href="/pages/voter/candidates"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">👥
            Candidates</a>
        <a href="/pages/voter/voting"
            style="text-decoration: none; color: #2563eb; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid #2563eb; font-weight: 600;">🗳️
            Vote Now</a>
        <a href="/pages/voter/history"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">🕒
            History</a>
        <a href="/pages/voter/results"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📈
            Results</a>
    </div>


    <div class="container"
        style="margin-top: 170px; max-width: 1000px; margin-left: auto; margin-right: auto; padding: 20px;">
        <h1 style="margin: 0 0 10px 0; color: #1e293b;">Cast Your Vote</h1>
        <p style="color: #ef4444; margin-bottom: 30px; font-weight: 600;">⚠️ Warning: You can only vote once. This
            action cannot be undone.</p>


        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Search by Name, ID...">
        </div>


        <div class="card"
            style="background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0; margin-bottom: 25px; color: #1e293b;">Select your preferred candidate</h3>

            <div id="candidateList" style="display: grid; gap: 15px;">
                <p style="text-align: center; color: #64748b;">Loading candidates...</p>
            </div>


            <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
                <button id="confirmBtn" class="btn"
                    style="background: #2563eb; color: white; padding: 12px 35px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer;">Confirm
                    Vote</button>
            </div>
        </div>
        <footer style="text-align: center; margin-top: 50px; padding: 20px; color: #94a3b8; font-size: 0.9rem;">
            © 2026 Mae Fah Luang University - All rights reserved
        </footer>
    </div>


    <script>
        // ==========================================
        // 1. ดึงข้อมูลผู้สมัครมาแสดงเป็นตัวเลือก 
        // ==========================================
        fetch('/Voter/candidates')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('candidateList');
                list.innerHTML = '';



                const themeColors = [
                    { bg: '#eff6ff', text: '#2563eb' },
                    { bg: '#f0fdf4', text: '#16a34a' },
                    { bg: '#faf5ff', text: '#9333ea' },
                    { bg: '#fff7ed', text: '#ea580c' }
                ];


                data.forEach((candidate, index) => {
                    const theme = themeColors[index % themeColors.length];


                    const candidateHTML = `
                        <label class="candidate-label" style="display: flex; align-items: center; gap: 20px; padding: 20px; border: 1.5px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: 0.2s;">
                            <input type="radio" name="candidate" value="${candidate.can_id}" style="width: 20px; height: 20px; cursor: pointer;">
                            <div style="width: 50px; height: 50px; background: ${theme.bg}; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: ${theme.text}; font-size: 1.5rem; flex-shrink: 0;">👤</div>
                            <div style="flex-grow: 1;">
                                <h3 style="margin: 0; font-size: 1.1rem; color: #1e293b;">${candidate.name} <span style="font-weight: normal; color: #94a3b8; font-size: 0.9rem;">(${candidate.can_id})</span></h3>
                                <p style="margin: 5px 0 0; color: #64748b; font-size: 0.9rem; line-height: 1.5;">${candidate.policy}</p>
                            </div>
                        </label>
                    `;
                    list.innerHTML += candidateHTML;
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('candidateList').innerHTML = '<p style="color:red;">Error loading candidates.</p>';
            });


        // ==========================================
        // 2. จัดการตอนกดปุ่ม "Confirm Vote"
        // ==========================================
        document.getElementById('confirmBtn').addEventListener('click', () => {

            const selectedCandidate = document.querySelector('input[name="candidate"]:checked');


            // ถ้ายังไม่เลือกใครเลย แจ้งเตือน
            if (!selectedCandidate) {
                alert('⚠️ Please select a candidate before confirming your vote!');
                return;
            }


            const selectedCanId = selectedCandidate.value;


            // ถามยืนยันอีกครั้ง
            const confirmVote = confirm(`Are you sure you want to vote for candidate ${selectedCanId}? This action cannot be undone.`);

            if (confirmVote) {
                // ข้อมูลที่จะส่งไป Backend
                const voteData = {
                    citizen_id: "1234567890123", // รหัสผู้ใช้จำลอง (เดี๋ยวเราค่อยเชื่อมระบบ Login จริงๆ ทีหลัง)
                    can_id: selectedCanId
                };


                // ส่ง POST Request ไปหา API /vote
                fetch('/Voter/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(voteData)
                })
                    .then(response => {
                        if (response.ok) {
                            alert('✅ Your vote has been successfully submitted!');

                            window.location.href = '/pages/voter/results';
                        } else {
                            alert('❌ Failed to submit vote.');
                        }
                    })
                    .catch(error => {
                        console.error('Error submitting vote:', error);
                        alert('❌ System error. Could not connect to server.');
                    });
            }
        });
    </script>
</body>

</html>
