<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voter Login - MFU Election</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="voter-bg" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f7ff;">
    <div class="container" style="max-width: 400px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem; display: flex; justify-content: center;">
            <a href="index.html" style="text-decoration: none; color: #64748b; font-weight: 600;">← Back to Home</a>
        </div>
        <div class="card" style="padding: 2.5rem;">
            
            <div style="text-align: center; font-size: 2.5rem; margin-bottom: 0.5rem;">🗳️</div>
            
            <h2 style="text-align: center; color: #1e3a8a; margin-bottom: 0.5rem;">Voter Login</h2>
            
            <p style="text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 2rem;">Please verify your identity to vote</p>
            
            <form>
                <div class="form-group">
                    <label>Citizen ID (13 Digits)</label>
                    <input type="text" placeholder="X-XXXX-XXXXX-XX-X">
                </div>
                <div class="form-group">
                    <label>Laser ID (Back of ID Card)</label>
                    <input type="text" placeholder="JT0-XXXXXXX-XX">
                </div>
                <a href="voter-dashboard.html" class="btn" style="background: #2563eb; color: white; width: 100%; text-align: center; display: block; text-decoration: none; padding: 10px 0; border-radius: 8px; font-weight: bold;">Login</a>
            </form>

            <!-- <div style="margin-top: 2rem; padding: 1rem; background: #eff6ff; border-radius: 8px; font-size: 0.8rem; color: #1d4ed8;">
                <strong>Test Account:</strong><br>
                ID: 1234567890123 / Laser: AB12345678
            </div> -->
        </div>
    </div>
</body>
</html>
