<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Information</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>

<body style="
      display: block;
      background: #f8fafc;
      font-family: &quot;Inter&quot;, sans-serif;
    ">
  <nav class="navbar candidate" style="
        background-color: #16a34a;
        color: white;
        padding: 1rem 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      ">
    <h2 style="margin: 0">MFU Voting - Candidate</h2>
    <a href="index.html" class="btn" style="
          background: white;
          color: #16a34a;
          padding: 8px 20px;
          text-decoration: none;
          border-radius: 8px;
          font-weight: bold;
        ">Logout</a>
  </nav>

  <div class="nav-links" style="
        background: white;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding: 15px 15px 13px;
        position: fixed;
        top: 65px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        z-index: 999;
        flex-wrap: wrap;
        box-sizing: border-box;
      ">
    <a href="dashboard.html" style="
          text-decoration: none;
          color: #64748b;
          display: flex;
          align-items: center;
          gap: 8px;
          flex-shrink: 0;
          padding-bottom: 5px;
          border-bottom: 3px solid transparent;
          font-weight: 600;
        ">📊 Dashboard</a>
    <a href="candidate-info.html" style="
          text-decoration: none;
          color: #16a34a;
          display: flex;
          align-items: center;
          gap: 8px;
          flex-shrink: 0;
          padding-bottom: 5px;
          border-bottom: 3px solid #16a34a;
          font-weight: 600;
        ">📝 Info</a>
    <a href="results.html" style="
          text-decoration: none;
          color: #64748b;
          display: flex;
          align-items: center;
          gap: 8px;
          flex-shrink: 0;
          padding-bottom: 5px;
          border-bottom: 3px solid transparent;
          font-weight: 600;
        ">📈 Election Results</a>
  </div>

  <div class="container" style="
        margin-top: 160px;
        max-width: 900px;
        margin-left: auto;
        margin-right: auto;
        padding: 20px;
      ">
    <h1 style="margin-bottom: 30px; font-size: 2.2rem; color: #1e293b">
      Candidate Information
    </h1>

    <div class="card" style="
          background: white;
          padding: 40px;
          border-radius: 16px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        ">
      <h3 style="
            margin-bottom: 25px;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 15px;
          ">
        Personal Details
      </h3>

      <div style="margin-top: 20px">
        <div style="margin-bottom: 25px">
          <label style="
                display: block;
                margin-bottom: 5px;
                font-weight: 600;
                color: #94a3b8;
                font-size: 0.85rem;
                text-transform: uppercase;
              ">Candidate ID</label>
          <p id="display-can-id" style="
                font-size: 1.1rem;
                font-weight: bold;
                color: #1e293b;
                margin: 0;
              ">
            Loading...
          </p>
        </div>

        <div style="margin-bottom: 25px">
          <label style="
                display: block;
                margin-bottom: 5px;
                font-weight: 600;
                color: #94a3b8;
                font-size: 0.85rem;
                text-transform: uppercase;
              ">Full Name</label>
          <p id="display-name" style="font-size: 1.2rem; color: #1e293b; margin: 0">
            Loading...
          </p>
        </div>

        <div style="margin-bottom: 25px">
          <label style="
                display: block;
                margin-bottom: 10px;
                font-weight: 600;
                color: #94a3b8;
                font-size: 0.85rem;
                text-transform: uppercase;
              ">Policies & Vision</label>
          <div id="display-policy" style="
                background: #f8fafc;
                padding: 20px;
                border-radius: 12px;
                border: 1px solid #f1f5f9;
                line-height: 1.8;
                color: #334155;
                white-space: pre-line;
              ">
            Loading policies...
          </div>
        </div>

        <div style="text-align: right; margin-top: 30px">
          <a href="candidate-manage.html" class="btn" style="
                background-color: #16a34a;
                color: white;
                padding: 12px 35px;
                font-size: 1rem;
                font-weight: bold;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                text-decoration: none;
                display: inline-block;
                transition: 0.3s;
              " onmouseover="this.style.backgroundColor = '#15803d'"
            onmouseout="this.style.backgroundColor = '#16a34a'">
            Edit Profile
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // ดึง ID จาก localStorage ที่เก็บไว้ตอน Login
      const can_id =
        localStorage.getItem("can_id") ||
        localStorage.getItem("candidate_id");

      // ตรวจสอบว่ามี ID หรือไม่ ถ้าไม่มีให้กลับไปหน้า Login
      if (!can_id) {
        alert("Session expired, please login again.");
        window.location.href = "candidate-login.html";
        return;
      }

      // ปรับ Fetch ให้ส่ง can_id ไปใน URL ด้วยเพื่อเป็นแผนสำรอง (Hybrid Method)
      fetch(`/candidate/profile?can_id=${can_id}`, {
        method: "GET",
        // ยังคง credentials ไว้เพื่อให้ระบบ Session ทำงานควบคู่ไปด้วย
        credentials: "include",
      })
        .then((response) => {
          // จัดการกรณีสำเร็จ (200) และผิดพลาด (500) ตามที่อาจารย์กำหนด
          if (response.status === 200) {
            return response.json();
          } else {
            // หาก Server ตอบกลับมาไม่ใช่ 200 (เช่น 401 หรือ 500)
            throw new Error("Server Error or Unauthorized");
          }
        })
        .then((result) => {
          // นำข้อมูลมาแสดงผลในหน้า UI
          if (result && result.can_id) {
            document.getElementById("display-can-id").innerText =
              result.can_id;
            document.getElementById("display-name").innerText = result.name;
            document.getElementById("display-policy").innerText =
              result.policy;
          }
        })
        .catch((err) => {
          console.error("Fetch Error:", err);
          // กรณีเกิด Error ให้ลองแจ้งเตือนผู้ใช้
          alert(
            "Failed to load candidate information. Please try logging in again.",
          );
        });
    });
  </script>
</body>

</html>
