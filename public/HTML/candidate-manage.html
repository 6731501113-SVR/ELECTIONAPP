<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Profile - Candidate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="display: block; background: #f8fafc; font-family: 'Inter', sans-serif;">

    <nav class="navbar candidate" style="background-color: #16a34a; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;">
        <h2 style="margin: 0;">MFU Voting - Candidate</h2>
        <a href="index.html" class="btn" style="background: white; color: #16a34a; padding: 8px 20px; text-decoration: none; border-radius: 8px; font-weight: bold;">Logout</a>
    </nav>

    <div class="nav-links" style="background: white; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 15px 15px 13px; position: fixed; top: 65px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 999; flex-wrap: wrap; box-sizing: border-box;">
        <a href="dashboard.html" style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📊 Dashboard</a>
        <a href="candidate-info.html" style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📝 Info</a>
        <a href="results.html" style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📈 Election Results</a>
    </div>

    <div class="container" style="margin-top: 160px; max-width: 900px; margin-left: auto; margin-right: auto; padding: 20px;">
        <h1 style="margin-bottom: 30px; font-size: 2.2rem; color: #1e293b;">Manage Information & Policies</h1>
        
        <div class="card" style="background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-bottom: 25px; color: #1e293b; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;">Edit Personal Information</h3>
            
            <div style="margin-top: 20px;">

                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Candidate ID</label>
                    <input id="input-can-id" type="text" disabled style="width: 100%; padding: 12px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; color: #94a3b8; font-weight: bold;">
                    <small style="color: #94a3b8; display: block; margin-top: 5px;">Candidate ID cannot be modified.</small>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Full Name</label>
                    <input id="input-name" type="text" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem;">
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Personal Info</label>
                    <textarea id="input-personal-info" rows="3" style="width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; line-height: 1.6; font-family: inherit;"></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Policies & Vision</label>
                    <textarea id="input-policy" rows="6" style="width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; line-height: 1.6; font-family: inherit;"></textarea>
                    <small style="color: #64748b; display: block; margin-top: 5px;">Recommend: Use bullet points for better readability.</small>
                </div>

                <div id="msg" style="display:none; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-weight: 600;"></div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px;">
                    <a href="candidate-info.html" class="btn" style="background-color: #e2e8f0; color: #475569; padding: 12px 40px; font-size: 1rem; font-weight: bold; border-radius: 8px; text-decoration: none; display: inline-block;">
                        Cancel
                    </a>
                    <button
                        type="button"
                        onclick="saveChanges()"
                        class="btn"
                        style="background-color: #16a34a; color: white; padding: 12px 40px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer;"
                        onmouseover="this.style.backgroundColor='#15803d'"
                        onmouseout="this.style.backgroundColor='#16a34a'">
                        Save Changes
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';

        document.addEventListener('DOMContentLoaded', () => {
            const can_id = localStorage.getItem('can_id') || localStorage.getItem('candidate_id');

            // if (!can_id) {
            //     alert('Session expired, please login again.');
            //     window.location.href = 'candidate-login.html';
            //     return;
            // }

            fetch(`${API}/candidate/info?can_id=${can_id}`, {
                method: 'GET',
                credentials: 'include'
            })
            .then(response => {
                if (response.status === 200) return response.json();
                throw new Error('Server Error');
            })
            .then(data => {
                document.getElementById('input-can-id').value       = data.can_id;
                document.getElementById('input-name').value          = data.name;
                document.getElementById('input-personal-info').value = data.personal_info || '';
                document.getElementById('input-policy').value        = data.policy || '';
            })
            .catch(err => {
                console.error('Fetch Error:', err);
                alert('Failed to load candidate information. Please try logging in again.');
            });
        });

        async function saveChanges() {
            const can_id        = localStorage.getItem('can_id') || localStorage.getItem('candidate_id');
            const name          = document.getElementById('input-name').value.trim();
            const personal_info = document.getElementById('input-personal-info').value;
            const policy        = document.getElementById('input-policy').value;

            if (!name) {
                showMsg('❌ Full Name must not be empty', false);
                return;
            }

            try {
                const res = await fetch(`${API}/candidate/info`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ can_id, name, personal_info, policy })
                });

                const data = await res.json();

                if (res.ok) {
                    showMsg('✅ Saved successfully!', true);
                    setTimeout(() => {
                        window.location.href = 'candidate-info.html';
                    }, 1000);
                } else {
                    showMsg(`❌ ${data.message}`, false);
                }

            } catch (err) {
                console.error('Save Error:', err);
                showMsg('❌ Cannot connect to server', false);
            }
        }

        function showMsg(text, success) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.style.display = 'block';
            el.style.background = success ? '#dcfce7' : '#fee2e2';
            el.style.color      = success ? '#166634' : '#991b1b';
        }
    </script>

</body>
</html>
