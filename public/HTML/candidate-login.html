<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Login - MFU Election</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0fdf4;">
    <div class="container" style="max-width: 400px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem; display: flex; justify-content: center;">
            <a href="index.html" style="text-decoration: none; color: #64748b; font-weight: 600;">← Back to Home</a>
        </div>
        <div class="card" style="padding: 2.5rem;">
            
            <div style="text-align: center; font-size: 2.5rem; margin-bottom: 0.5rem;">👤✅</div>
            
            <h2 style="text-align: center; color: #16a34a; margin-bottom: 0.5rem;">Candidate Login</h2>
            
            <p style="text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 2rem;">Access your campaign dashboard</p>
            
            <form>
                <div class="form-group">
                    <label>Candidate ID</label>
                    <input type="text" placeholder="e.g. C001">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <a href="candidate-dashboard.html" class="btn" style="background: #16a34a; color: white; width: 100%; text-align: center; display: block; text-decoration: none; padding: 10px 0; border-radius: 8px; font-weight: bold;">Sign In</a>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #64748b;">
                New candidate? <a href="candidate-register.html" style="color: #16a34a; font-weight: 600; text-decoration: none;">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
