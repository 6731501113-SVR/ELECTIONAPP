<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate List - MFU Election</title>
    <link rel="stylesheet" href="/CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            margin: 0;
        }

        .search-container {
            position: relative;
            max-width: 400px;
            margin-bottom: 35px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .search-container input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-container span {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
    </style>
</head>
<body style="display: block;">
    <nav class="navbar voter"
        style="background-color: #2563eb; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;">
        <h2 style="margin: 0;">MFU Voting - Voter</h2>
        <a href="/" onclick="logout()" class="btn"
            style="background: white; color: #2563eb; padding: 8px 20px; text-decoration: none; border-radius: 8px; font-weight: bold;">Logout</a>
    </nav>
    <div class="nav-links"
        style="background: white; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 15px 15px 13px; position: fixed; top: 65px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 999; flex-wrap: wrap; box-sizing: border-box;">
        <a href="/pages/voter/dashboard"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📊
            Dashboard</a>
        <a href="/pages/voter/candidates"
            style="text-decoration: none; color: #2563eb; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid #2563eb; font-weight: 600;">👥
            Candidates</a>
        <a href="/pages/voter/voting"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">🗳️
            Vote Now</a>
        <a href="/pages/voter/history"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">🕒
            History</a>
        <a href="/pages/voter/results"
            style="text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-bottom: 5px; border-bottom: 3px solid transparent; font-weight: 600;">📈
            Results</a>
    </div>
    <div class="container"
        style="margin-top: 170px; max-width: 1200px; margin-left: auto; margin-right: auto; padding: 20px;">
        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px;">
            <div>
                <h1 style="margin: 0 0 10px 0; color: #1e293b; font-size: 2.5rem;">Candidates</h1>
                <p style="margin: 0; color: #64748b;">Get to know your candidates and their policies</p>
            </div>
            <div class="search-container" style="margin-bottom: 0; min-width: 300px;">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search by name or ID...">
            </div>
        </div>
        <div id="candidateGrid" class="candidate-grid"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
            <p style="text-align: center; color: #64748b; width: 100%; grid-column: 1 / -1;">Loading candidate data...
            </p>
        </div>
        <footer style="text-align: center; margin-top: 50px; padding: 20px; color: #94a3b8; font-size: 0.9rem;">
            © 2026 Mae Fah Luang University - All rights reserved
        </footer>
    </div>

    <script>
        // ตัวแปรสำหรับเก็บข้อมูลผู้สมัครทั้งหมดไว้ในเครื่อง จะได้ไม่ต้องดึงจาก Database ใหม่ทุกครั้งที่พิมพ์ค้นหา
        let allCandidates = [];

        // ฟังก์ชันสำหรับแสดงผลการ์ดผู้สมัคร
        function renderCandidates(candidatesToRender) {
            const grid = document.getElementById('candidateGrid');
            grid.innerHTML = '';

            // ถ้าค้นหาแล้วไม่เจอใครเลย
            if (candidatesToRender.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #64748b; width: 100%; grid-column: 1 / -1;">No candidates found matching your search.</p>';
                return;
            }

            candidatesToRender.forEach(candidate => {
                // ใช้ || เผื่อกรณีที่ข้อมูลในฐานข้อมูลเป็น NULL
                const name = candidate.Name || 'Unknown';
                const policy = candidate.Policy || 'No policy provided';
                const imageElement = candidate.img 
                    ? `<img src="${candidate.img}" alt="${name}" style="width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #eff6ff;">`
                    : `<div style="width: 65px; height: 65px; background: #eff6ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #2563eb; font-size: 1.8rem;">👤</div>`;

                const cardHTML = `
                    <div class="card" style="background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                            ${imageElement}
                            <div>
                                <h3 style="margin: 0;">${name}</h3>
                                <span style="background: #eff6ff; color: #2563eb; padding: 2px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;">${candidate.Candidate_ID}</span>
                            </div>
                        </div>
                        <div style="border-top: 1px solid #f1f5f9; padding-top: 15px;">
                            <strong style="color: #475569;">Policies:</strong>
                            <ul style="padding-left: 20px; color: #64748b; margin-top: 10px; line-height: 1.5;">
                                <li>${policy}</li>
                            </ul>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // 1. ดึงข้อมูลจาก API ตอนโหลดหน้าเว็บ
        fetch('/voter/candidates')
            .then(response => response.json())
            .then(data => {
                allCandidates = data; // เก็บข้อมูลต้นฉบับไว้
                renderCandidates(allCandidates); // นำไปแสดงผลครั้งแรก
            })
            .catch(error => {
                console.error('❌ Failed to fetch data:', error);
                document.getElementById('candidateGrid').innerHTML = '<p style="color:red; text-align:center; width: 100%; grid-column: 1 / -1;">Error loading candidate data. Please try again later.</p>';
            });

        // 2. ระบบค้นหา
        document.getElementById('searchInput').addEventListener('input', function (e) {
            // เอาข้อความที่ผู้ใช้พิมพ์มาทำให้เป็นตัวเล็กทั้งหมด เพื่อให้ค้นหาได้ง่ายขึ้น
            const searchTerm = e.target.value.toLowerCase();

            // กรองข้อมูล (Filter)
            const filteredCandidates = allCandidates.filter(candidate => {
                const candidateName = (candidate.Name || '').toLowerCase();
                const candidateID = (candidate.Candidate_ID || '').toLowerCase();

                // เช็คว่าข้อความที่พิมพ์ มีอยู่ในชื่อ หรือ ไอดี หรือไม่
                return candidateName.includes(searchTerm) || candidateID.includes(searchTerm);
            });

            // นำข้อมูลที่กรองแล้วไปวาดบนหน้าจอใหม่
            renderCandidates(filteredCandidates);
        });

        function logout() {
            fetch('/logout', { method: 'POST' })
                .then(() => window.location.href = '/')
                .catch(err => console.error("Logout error:", err));
        }
    </script>
</body>

</html>
