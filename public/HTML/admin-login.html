<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - MFU Election</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #faf5ff;">
    <div class="container" style="max-width: 400px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem; display: flex; justify-content: center;">
            <a href="index.html" style="text-decoration: none; color: #64748b; font-weight: 600;">← Back to Home</a>
        </div>
        
        <div class="card" style="padding: 2.5rem; border-radius: 20px;">
            <div style="text-align: center; font-size: 2.5rem; margin-bottom: 1rem;">🛡️</div>
            
            <h2 style="text-align: center; color: #7c3aed; margin-bottom: 0.5rem;">System Admin</h2>
            <p style="text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 2rem;">Authorized Personnel Only</p>
            
            <form>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" placeholder="Admin Username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <a href="admin-dashboard.html" class="btn" style="background: #9333ea; color: white; width: 100%; text-align: center; display: block; text-decoration: none; padding: 10px 0; border-radius: 8px; font-weight: bold;">Access Control</a>
            </form>
        </div>
    </div>
</body>
</html>
